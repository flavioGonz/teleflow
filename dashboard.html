<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Teleflow - Agent Monitoring Pro v2</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online-glow { box-shadow: 0 0 10px rgba(34, 197, 94, 0.4); }
        .agent-row:hover { transform: translateX(2px); }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-dot { animation: pulse 2s infinite; }
        .notification-toast { animation: slideIn 0.3s ease-out; }
        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors">
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // NOTIFICACIONES PWA
    // ==========================================
    const sendPWANotification = (title, options = {}) => {
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(title, {
                icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%238B5CF6" width="100" height="100"/><text x="50" y="60" font-size="50" fill="white" text-anchor="middle" font-weight="bold">T</text></svg>',
                tag: 'teleflow',
                requireInteraction: false,
                ...options
            });
        }
    };

    const requestNotificationPermission = async () => {
        if ('Notification' in window && Notification.permission === 'default') {
            const permission = await Notification.requestPermission();
            return permission === 'granted';
        }
        return Notification.permission === 'granted';
    };

    // ==========================================
    // COMPONENTE: TOAST DE NOTIFICACIONES
    // ==========================================
    function ToastNotification({ message, type, onClose }) {
        useEffect(() => {
            const timer = setTimeout(onClose, 4000);
            return () => clearTimeout(timer);
        }, [onClose]);

        const bgColor = {
            success: 'bg-green-100 text-green-800',
            error: 'bg-red-100 text-red-800',
            info: 'bg-blue-100 text-blue-800',
            warning: 'bg-yellow-100 text-yellow-800'
        }[type] || 'bg-blue-100 text-blue-800';

        return (
            <div className={`${bgColor} px-4 py-3 rounded-lg shadow-lg notification-toast`}>
                {message}
            </div>
        );
    }

    // ==========================================
    // COMPONENTE SETTINGS
    // ==========================================
    function SettingsPanel({ isOpen, onClose, onSettingsChange }) {
        const [notifications, setNotifications] = useState(() => {
            const saved = localStorage.getItem('teleflow_notifications');
            return saved ? JSON.parse(saved) : {
                agent_login: true,
                agent_logout: true,
                agent_status_change: true,
                call_received: true,
                call_missed: true,
                queue_alert: true,
                agent_break: false
            };
        });

        const toggleNotification = (key) => {
            const updated = { ...notifications, [key]: !notifications[key] };
            setNotifications(updated);
            localStorage.setItem('teleflow_notifications', JSON.stringify(updated));
            onSettingsChange(updated);
        };

        if (!isOpen) return null;

        return (
            <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl p-6 max-w-md w-full animate-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold">Configuración</h2>
                        <button onClick={onClose} className="text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                            <span className="material-icons">close</span>
                        </button>
                    </div>

                    <div className="mb-6">
                        <h3 className="text-lg font-semibold mb-4 flex items-center gap-2">
                            <span className="material-icons">notifications_active</span>
                            Notificaciones de PWA
                        </h3>

                        <div className="space-y-3">
                            {[
                                { key: 'agent_login', label: 'Agente Conectado', icon: 'login' },
                                { key: 'agent_logout', label: 'Agente Desconectado', icon: 'logout' },
                                { key: 'agent_status_change', label: 'Cambio de Estado', icon: 'swap_horiz' },
                                { key: 'call_received', label: 'Llamada Recibida', icon: 'call' },
                                { key: 'call_missed', label: 'Llamada Perdida', icon: 'call_missed' },
                                { key: 'queue_alert', label: 'Alerta de Cola', icon: 'warning' },
                                { key: 'agent_break', label: 'Agente en Break', icon: 'coffee' }
                            ].map(({ key, label, icon }) => (
                                <div key={key} className="flex items-center justify-between p-3 bg-slate-100 dark:bg-slate-700 rounded-lg">
                                    <div className="flex items-center gap-3">
                                        <span className="material-icons text-slate-600 dark:text-slate-400">{icon}</span>
                                        <label className="font-medium cursor-pointer">{label}</label>
                                    </div>
                                    <button
                                        onClick={() => toggleNotification(key)}
                                        className={`relative w-12 h-7 rounded-full transition-colors ${notifications[key] ? 'bg-purple-600' : 'bg-slate-300'}`}
                                    >
                                        <div
                                            className={`absolute top-1 left-1 w-5 h-5 bg-white rounded-full transition-transform ${notifications[key] ? 'translate-x-5' : ''}`}
                                        />
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    <button
                        onClick={async () => {
                            const granted = await requestNotificationPermission();
                            if (granted) {
                                sendPWANotification('Notificaciones Habilitadas', {
                                    body: 'Ahora recibirás alertas en vivo de Teleflow'
                                });
                            }
                        }}
                        className="w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 rounded-lg transition-colors"
                    >
                        🔔 Habilitar Notificaciones
                    </button>

                    <div className="mt-6 border-t border-slate-200 dark:border-slate-700 pt-6">
                        <h3 className="font-semibold mb-3">Sistema</h3>
                        <div className="space-y-3">
                            <div className="flex items-center justify-between p-3 bg-slate-100 dark:bg-slate-700 rounded-lg">
                                <label className="font-medium">Tema Oscuro</label>
                                <input
                                    type="checkbox"
                                    onChange={(e) => {
                                        if (e.target.checked) {
                                            document.documentElement.classList.add('dark');
                                            localStorage.setItem('theme', 'dark');
                                        } else {
                                            document.documentElement.classList.remove('dark');
                                            localStorage.setItem('theme', 'light');
                                        }
                                    }}
                                    className="w-5 h-5 cursor-pointer"
                                />
                            </div>
                            <div className="flex items-center justify-between p-3 bg-slate-100 dark:bg-slate-700 rounded-lg">
                                <label className="font-medium">Auto-actualizar</label>
                                <span className="text-sm text-slate-600 dark:text-slate-400">Cada 5 seg</span>
                            </div>
                        </div>
                    </div>

                    <button
                        onClick={onClose}
                        className="w-full mt-6 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-900 dark:text-white font-medium py-2 rounded-lg transition-colors"
                    >
                        Cerrar
                    </button>
                </div>
            </div>
        );
    }

    // ==========================================
    // COMPONENTE DETALLE DE AGENTE
    // ==========================================
    function AgentDetailsPanel({ agent, isOpen, onClose }) {
        if (!isOpen || !agent) return null;

        return (
            <div className="fixed inset-0 bg-black bg-opacity-50 z-40 flex items-center justify-center p-4">
                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl p-6 max-w-2xl w-full">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold">Detalles del Agente #{agent.ext}</h2>
                        <button onClick={onClose} className="text-slate-500 hover:text-slate-700">
                            <span className="material-icons">close</span>
                        </button>
                    </div>

                    <div className="grid grid-cols-2 gap-6">
                        <div>
                            <h3 className="font-semibold text-lg mb-3">Información Técnica</h3>
                            <div className="space-y-2 text-sm">
                                <p><strong>Nombre:</strong> {agent.name}</p>
                                <p><strong>Estado:</strong> <span className={`px-2 py-1 rounded text-xs font-bold ${
                                    agent.status === 'ONLINE' ? 'bg-green-100 text-green-800' :
                                    agent.status === 'BUSY' ? 'bg-yellow-100 text-yellow-800' :
                                    'bg-gray-100 text-gray-800'
                                }`}>{agent.status}</span></p>
                                <p><strong>IP Origen:</strong> <code>{agent.ip}</code></p>
                                <p><strong>MAC:</strong> <code>{agent.mac}</code></p>
                                <p><strong>RTT:</strong> {agent.rtt}</p>
                            </div>
                        </div>

                        <div>
                            <h3 className="font-semibold text-lg mb-3">Métricas del Día</h3>
                            <div className="space-y-2 text-sm">
                                <p><strong>Llamadas Manejadas:</strong> <span className="text-lg font-bold text-purple-600">{agent.total_calls}</span></p>
                                <p><strong>AHT Promedio:</strong> <span className="text-lg font-bold text-purple-600">{agent.avg_aht}</span></p>
                                <p><strong>ACW Promedio:</strong> {agent.acw}</p>
                                <p><strong>En Llamada:</strong> {agent.in_call ? agent.in_call + ' seg' : 'No'}</p>
                            </div>
                        </div>

                        {agent.in_call > 0 && (
                            <div className="col-span-2 mt-4 p-4 bg-blue-50 dark:bg-blue-900/20 rounded-lg border border-blue-200 dark:border-blue-800">
                                <h4 className="font-semibold mb-3 flex items-center gap-2">
                                    <span className="material-icons text-blue-600">call_received</span>
                                    Llamada Activa en Progreso
                                    <span className="pulse-dot w-2 h-2 bg-blue-600 rounded-full"></span>
                                </h4>
                                <p className="text-sm"><strong>Duración:</strong> {Math.floor(agent.in_call / 60)}:{String(agent.in_call % 60).padStart(2, '0')}</p>
                            </div>
                        )}

                        <button
                            onClick={() => sendPWANotification(`Agente #${agent.ext}`, { body: `Estado: ${agent.status}, Llamadas hoy: ${agent.total_calls}` })}
                            className="col-span-2 mt-4 w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 rounded-lg transition-colors"
                        >
                            📤 Enviar Notificación de Prueba
                        </button>
                    </div>

                    <button
                        onClick={onClose}
                        className="w-full mt-6 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-900 dark:text-white font-medium py-2 rounded-lg transition-colors"
                    >
                        Cerrar
                    </button>
                </div>
            </div>
        );
    }

    // ==========================================
    // COMPONENTE FILA DE AGENTE
    // ==========================================
    function AgentRow({ agent, onSelect }) {
        const statusColor = {
            'ONLINE': 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400',
            'BUSY': 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400',
            'OFFLINE': 'bg-gray-100 text-gray-800 dark:bg-gray-900/30 dark:text-gray-400',
            'AWAY': 'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400'
        };

        const getBgColor = (name) => {
            const colors = ['from-purple-400 to-pink-400', 'from-blue-400 to-cyan-400', 'from-rose-400 to-red-400', 'from-amber-400 to-orange-400'];
            const hash = name.charCodeAt(0) % colors.length;
            return colors[hash];
        };

        return (
            <div
                onClick={() => onSelect(agent)}
                className="grid grid-cols-12 items-center px-6 py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl hover:border-purple-500 transition-all cursor-pointer agent-row"
            >
                {/* Agente */}
                <div className="col-span-3 flex items-center gap-4">
                    <div className={`h-10 w-10 rounded-full bg-gradient-to-br ${getBgColor(agent.name)} flex items-center justify-center text-xs font-bold text-white`}>
                        {agent.name.split(' ').map(n => n[0]).join('').substring(0, 2)}
                    </div>
                    <div>
                        <div className="font-bold">#{agent.ext}</div>
                        <div className="text-xs text-slate-500">{agent.name}</div>
                    </div>
                </div>

                {/* Estado */}
                <div className="col-span-2 flex justify-center">
                    <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold ${statusColor[agent.status] || statusColor['OFFLINE']}`}>
                        <span className={`status-dot ${agent.status === 'ONLINE' ? 'bg-green-500 online-glow' : agent.status === 'BUSY' ? 'bg-yellow-500 pulse-dot' : 'bg-gray-400'}`}></span>
                        {agent.status}
                    </span>
                </div>

                {/* Llamada Activa */}
                <div className="col-span-2 text-center">
                    {agent.in_call > 0 ? (
                        <>
                            <div className="text-sm font-bold text-purple-600 flex items-center justify-center gap-1">
                                <span className="pulse-dot w-2 h-2 bg-red-500"></span>
                                {Math.floor(agent.in_call / 60)}:{String(agent.in_call % 60).padStart(2, '0')}
                            </div>
                            <div className="text-[10px] text-slate-500">En Llamada</div>
                        </>
                    ) : (
                        <div className="text-slate-500 text-sm">Disponible</div>
                    )}
                </div>

                {/* Performance */}
                <div className="col-span-3 flex justify-center gap-8">
                    <div className="text-center">
                        <div className="text-sm font-bold text-purple-600">{agent.total_calls}</div>
                        <div className="text-[10px] text-slate-500">LLAMADAS</div>
                    </div>
                    <div className="text-center border-l border-slate-300 dark:border-slate-600 pl-8">
                        <div className="text-sm font-bold text-purple-600">{agent.avg_aht}</div>
                        <div className="text-[10px] text-slate-500">AHT</div>
                    </div>
                </div>

                {/* Red */}
                <div className="col-span-2 text-right">
                    <div className="text-[10px] text-pink-500 font-mono">{agent.ip}</div>
                    <div className="text-[10px] text-purple-400 font-mono">{agent.mac}</div>
                </div>
            </div>
        );
    }

    // ==========================================
    // APP PRINCIPAL
    // ==========================================
    function App() {
        const [agents, setAgents] = useState([]);
        const [loading, setLoading] = useState(true);
        const [selectedAgent, setSelectedAgent] = useState(null);
        const [detailsOpen, setDetailsOpen] = useState(false);
        const [settingsOpen, setSettingsOpen] = useState(false);
        const [toast, setToast] = useState(null);
        const [filter, setFilter] = useState('');
        const [statusFilter, setStatusFilter] = useState('');
        const pollIntervalRef = useRef(null);

        // Cargar datos de agentes
        const loadAgents = async () => {
            try {
                const response = await fetch('/teleflow/api/agents.php?action=get_agents_data');
                const data = await response.json();
                if (data.success) {
                    setAgents(data.agents);
                } else {
                    setToast({ message: 'Error al cargar agentes', type: 'error' });
                }
            } catch (error) {
                console.error('Error:', error);
                setToast({ message: 'No se pudo conectar a la API', type: 'error' });
            } finally {
                setLoading(false);
            }
        };

        useEffect(() => {
            loadAgents();
            
            // Polling automático cada 5 segundos
            pollIntervalRef.current = setInterval(loadAgents, 5000);

            return () => {
                if (pollIntervalRef.current) clearInterval(pollIntervalRef.current);
            };
        }, []);

        // Filtrar agentes
        const filteredAgents = agents.filter(agent => {
            const matchesFilter = agent.name.toLowerCase().includes(filter.toLowerCase()) || 
                                 agent.ext.includes(filter);
            const matchesStatus = !statusFilter || agent.status === statusFilter;
            return matchesFilter && matchesStatus;
        });

        return (
            <div className="min-h-screen bg-slate-50 dark:bg-slate-900">
                {/* Header */}
                <header className="sticky top-0 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 p-6 z-10">
                    <div className="flex justify-between items-center max-w-7xl mx-auto">
                        <div>
                            <h1 className="text-3xl font-bold">📊 Agent Monitoring</h1>
                            <p className="text-slate-600 dark:text-slate-400 mt-1">Seguimiento en tiempo real - {agents.length} agentes</p>
                        </div>
                        <button
                            onClick={() => setSettingsOpen(true)}
                            className="p-3 rounded-lg bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors"
                        >
                            <span className="material-icons">settings</span>
                        </button>
                    </div>
                </header>

                {/* Content */}
                <main className="p-6 max-w-7xl mx-auto">
                    {/* Filtros */}
                    <div className="flex flex-wrap gap-3 mb-6">
                        <input
                            type="text"
                            placeholder="🔍 Buscar por nombre o interno..."
                            value={filter}
                            onChange={(e) => setFilter(e.target.value)}
                            className="flex-1 min-w-[240px] px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-purple-500"
                        />
                        <select
                            value={statusFilter}
                            onChange={(e) => setStatusFilter(e.target.value)}
                            className="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-purple-500"
                        >
                            <option value="">Todos los Estados</option>
                            <option value="ONLINE">Online</option>
                            <option value="BUSY">En Llamada</option>
                            <option value="OFFLINE">Offline</option>
                        </select>
                        <button
                            onClick={loadAgents}
                            className="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg transition-colors font-medium"
                        >
                            🔄 Actualizar
                        </button>
                    </div>

                    {/* Lista de Agentes */}
                    {loading ? (
                        <div className="text-center py-10">
                            <div className="inline-block animate-spin">
                                <span className="material-icons text-4xl text-purple-600">refresh</span>
                            </div>
                            <p className="mt-4 text-slate-600 dark:text-slate-400">Cargando agentes...</p>
                        </div>
                    ) : filteredAgents.length === 0 ? (
                        <div className="text-center py-10">
                            <span className="material-icons text-6xl text-slate-300 dark:text-slate-600">person_off</span>
                            <p className="mt-4 text-slate-600 dark:text-slate-400">No hay agentes</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {filteredAgents.map(agent => (
                                <AgentRow
                                    key={agent.ext}
                                    agent={agent}
                                    onSelect={(a) => {
                                        setSelectedAgent(a);
                                        setDetailsOpen(true);
                                    }}
                                />
                            ))}
                        </div>
                    )}

                    {/* Summary Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mt-8">
                        <div className="stat-card bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700">
                            <div className="text-slate-600 dark:text-slate-400 text-sm font-bold uppercase">Agentes Online</div>
                            <div className="text-4xl font-bold mt-2 text-green-600">{agents.filter(a => a.status === 'ONLINE').length}/{agents.length}</div>
                        </div>
                        <div className="stat-card bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700">
                            <div className="text-slate-600 dark:text-slate-400 text-sm font-bold uppercase">En Llamada</div>
                            <div className="text-4xl font-bold mt-2 text-yellow-600">{agents.filter(a => a.status === 'BUSY').length}</div>
                        </div>
                        <div className="stat-card bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700">
                            <div className="text-slate-600 dark:text-slate-400 text-sm font-bold uppercase">Total Llamadas</div>
                            <div className="text-4xl font-bold mt-2 text-purple-600">{agents.reduce((sum, a) => sum + a.total_calls, 0)}</div>
                        </div>
                        <div className="stat-card bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700">
                            <div className="text-slate-600 dark:text-slate-400 text-sm font-bold uppercase">AHT Promedio</div>
                            <div className="text-3xl font-bold mt-2 text-blue-600">
                                {agents.length > 0 ? (() => {
                                    const totalSeconds = agents.reduce((sum, a) => {
                                        const parts = a.avg_aht.split(':');
                                        return sum + parseInt(parts[0]) * 60 + parseInt(parts[1]);
                                    }, 0) / agents.length;
                                    const mins = Math.floor(totalSeconds / 60);
                                    const secs = Math.floor(totalSeconds % 60);
                                    return mins + ':' + String(secs).padStart(2, '0');
                                })() : '00:00'}
                            </div>
                        </div>
                    </div>
                </main>

                {/* Toast Notification */}
                {toast && (
                    <div className="fixed bottom-6 right-6 z-50">
                        <ToastNotification
                            message={toast.message}
                            type={toast.type}
                            onClose={() => setToast(null)}
                        />
                    </div>
                )}

                {/* Modales */}
                <SettingsPanel
                    isOpen={settingsOpen}
                    onClose={() => setSettingsOpen(false)}
                    onSettingsChange={(settings) => {
                        console.log('Settings updated:', settings);
                        setToast({ message: 'Configuración guardada', type: 'success' });
                    }}
                />
                <AgentDetailsPanel
                    agent={selectedAgent}
                    isOpen={detailsOpen}
                    onClose={() => setDetailsOpen(false)}
                />
            </div>
        );
    }

    // Renderizar la app
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
